// Globaler Gyro-Wert – außerhalb von React damit er immer aktuell ist
let g_gamma = 0;

function getLevelStats(level) {
  const lvl = Math.min(level, 20);

  // Geschwindigkeit: sehr sanft, erst ab Level 8 merklich schneller
  let spd;
  if      (lvl <= 5)  spd = 1.00 + (lvl-1)*0.025;   // 1.00 → 1.10
  else if (lvl <= 10) spd = 1.10 + (lvl-5)*0.040;   // 1.10 → 1.30
  else if (lvl <= 15) spd = 1.30 + (lvl-10)*0.060;  // 1.30 → 1.60
  else                spd = 1.60 + (lvl-15)*0.070;  // 1.60 → 1.95

  // Plattformen: sehr langsam abnehmen – bleibt lange spielbar
  let platCount;
  if      (lvl <= 10) platCount = Math.round(52 - (lvl-1)*0.7);   // 52 → 46
  else if (lvl <= 15) platCount = Math.round(46 - (lvl-10)*1.2);  // 46 → 40
  else                platCount = Math.max(32, Math.round(40 - (lvl-15)*1.6)); // 40 → 32

  // Abstände: erst ab Level 7 langsam größer
  let platGapMin;
  if      (lvl <= 6)  platGapMin = 46 + (lvl-1)*1.5;   // 46 → 54
  else if (lvl <= 12) platGapMin = 54 + (lvl-6)*3.0;   // 54 → 72
  else                platGapMin = 72 + (lvl-12)*3.5;  // 72 → 100

  const platGapMax = platGapMin * 1.35;

  // Spalten: erst ab Level 12 von 5 auf 4 reduzieren
  const platCols = lvl <= 11 ? 5 : Math.max(4, Math.round(5 - (lvl-11)*0.2));

  return {
    gravity:    0.18 * spd,
    jumpForce: -7.5  * spd,
    moveSpeed:  2.2  * spd,
    enemySpeed: 0.6  * spd,
    nextLevel:  lvl  * 150,
    platCount,
    platGapMin,
    platGapMax,
    platCols,
  };
}

  ctx.strokeStyle="#1a1a1a";ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(-9,-8,10,11,-0.1,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.ellipse(9,-8,10,11,0.1,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle="rgba(255,120,80,0.5)";ctx.beginPath();ctx.ellipse(-17,-3,5,3.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(17,-3,5,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#e53935";ctx.beginPath();ctx.arc(0,4,9,0.2,Math.PI-0.2);ctx.fill();

}

// Spielhelfer
function rnd(a,b){return a+Math.random()*(b-a);}
function rndInt(a,b){return Math.floor(rnd(a,b+1));}
function makePlatform(x,y,ft,lv){
  const r=Math.random(),cc=0.08+Math.min((lv||1)*0.012,0.25),mc=0.08+Math.min((lv||1)*0.010,0.22);
  const type=ft||(r<cc?"crumble":r<cc+mc?"moving":"normal");
  // Bewegende Plattformen driften langsam in eine feste Richtung
  const driftSpeed = type==="moving" ? (Math.random()<0.5?1:-1)*(0.4+Math.random()*0.5) : 0;
  return{x,y,id:Math.random(),type,dir:1,driftSpeed,crumbleTimer:0,crumbling:false,alpha:1};
}
// Abstand zwischen Plattformen (fix, sodass keine Überlappung möglich)
const PLAT_H_GAP = 100; // horizontaler Mindestabstand zwischen Plattformen
const PLAT_CELL_W = PLATFORM_W + PLAT_H_GAP; // = 128px → Zellbreite

function genPlatforms(n,lv,sy=H){
  const a=[];
  const st=getLevelStats(lv);
  // Zellgröße: garantiert kein Überlappen
  const CW = PLAT_CELL_W;                      // 128px breit
  const CH = Math.round(st.platGapMin * 3.2);  // vertikaler Abstand
  // Bereich: 9 Spalten x 20 Reihen
  const COLS = 9, ROWS = 20;
  for(let row=0; row<ROWS; row++){
    for(let col=-Math.floor(COLS/2); col<Math.ceil(COLS/2); col++){
      // Skip-Chance: Level 1 = 20%, Level 20 = 55%
      const skip = 0.55 + (lv-1)*0.014;
      if(Math.random() < skip) continue;
      // Plattform exakt in Zellmitte mit kleinem Jitter
      const maxJitter = Math.floor((CW - PLATFORM_W) / 2) - 2; // max ±27px
      const cx = col * CW + Math.round(rnd(-maxJitter, maxJitter));
      const cy = sy - row * CH + Math.round(rnd(-CH*0.1, CH*0.1));
      a.push(makePlatform(cx, cy, null, lv));
    }
  }
  // Startplattform direkt unter Spieler
  a.unshift(makePlatform(-PLATFORM_W/2, H-80, "normal", 1));
  return a;
}
const ET=[{emoji:"🐱",size:32},{emoji:"🐺",size:32},{emoji:"🦊",size:32},{emoji:"🦎",size:30},{emoji:"🐛",size:30}];
function makeEnemy(cy,lv){const t=ET[rndInt(0,ET.length-1)],spd=getLevelStats(lv).enemySpeed;return{...t,id:Math.random(),x:rnd(0,W-44),y:cy-rnd(H*0.2,H*0.85),vx:(Math.random()<0.5?1:-1)*(spd+rnd(0,0.4)),vy:Math.random()<0.3?(Math.random()<0.5?0.4:-0.4):0};}
function makePU(cy){return{id:Math.random(),type:Math.random()<0.5?"shield":"rocket",x:rnd(20,W-52),y:cy-rnd(H*0.3,H*0.8),bob:Math.random()*Math.PI*2};}

// UFO zeichnen
function drawUFO(ctx,x,y,sc,frame,hue){
  ctx.save();ctx.translate(x,y+Math.sin(frame*0.04)*4);
  const beam=ctx.createLinearGradient(0,10*sc,0,45*sc);beam.addColorStop(0,"rgba(255,230,100,0.55)");beam.addColorStop(1,"rgba(255,230,100,0)");
  ctx.fillStyle=beam;ctx.beginPath();ctx.moveTo(-8*sc,10*sc);ctx.lineTo(-18*sc,45*sc);ctx.lineTo(18*sc,45*sc);ctx.lineTo(8*sc,10*sc);ctx.closePath();ctx.fill();
  const dg=ctx.createLinearGradient(-20*sc,0,20*sc,12*sc);dg.addColorStop(0,`hsl(${200+hue},80%,75%)`);dg.addColorStop(0.5,`hsl(${200+hue},60%,55%)`);dg.addColorStop(1,`hsl(${200+hue},80%,40%)`);
  ctx.fillStyle=dg;ctx.beginPath();ctx.ellipse(0,8*sc,22*sc,9*sc,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=`hsla(${hue+40},90%,65%,0.8)`;ctx.beginPath();ctx.ellipse(0,6*sc,18*sc,4*sc,0,0,Math.PI*2);ctx.fill();
  [-14,-7,0,7,14].forEach((dx,i)=>{ctx.fillStyle=i%2===0?"#ffd600":"#ff6e40";ctx.beginPath();ctx.arc(dx*sc,12*sc,2.2*sc,0,Math.PI*2);ctx.fill();});
  const dome=ctx.createRadialGradient(-5*sc,-4*sc,2*sc,0,0,13*sc);dome.addColorStop(0,"rgba(180,230,255,0.92)");dome.addColorStop(0.6,"rgba(100,180,230,0.7)");dome.addColorStop(1,"rgba(60,130,200,0.5)");
  ctx.fillStyle=dome;ctx.beginPath();ctx.ellipse(0,0,12*sc,10*sc,0,Math.PI,0);ctx.fill();
  ctx.restore();
}

const UFOS=[{x:80,y:180,sc:0.55,hue:0},{x:260,y:120,sc:0.45,hue:180},{x:310,y:280,sc:0.5,hue:90}];
const CLOUDS=[{x:30,y:80,s:1.2,l:0},{x:220,y:50,s:0.9,l:0},{x:130,y:140,s:0.7,l:0},{x:290,y:110,s:1.0,l:1},{x:60,y:200,s:0.8,l:1},{x:200,y:170,s:1.1,l:1}];

function drawCloud(ctx,x,y,sc){ctx.fillStyle="rgba(255,255,255,0.85)";[[0,0,28],[30,8,22],[-28,8,22],[16,-10,18],[-14,-10,18]].forEach(([dx,dy,r])=>{ctx.beginPath();ctx.arc(x+dx*sc,y+dy*sc,r*sc,0,Math.PI*2);ctx.fill();});}

function drawBG(ctx,bgImg,cameraY,cameraX,frame){
  // Hintergrund immer vollständig füllen
  ctx.fillStyle="#87ceeb";
  ctx.fillRect(0,0,W,H);
  if(bgImg){
    const tileH = H + 60;
    const tileW = W;
    // Positives Modulo sicherstellen (kein negativer Offset)
    const rawPy = (cameraY * 0.007 - 30);
    const py = ((rawPy % tileH) + tileH) % tileH;
    const rawPx = cameraX * 0.04;
    const px = ((rawPx % tileW) + tileW) % tileW;
    // 3x vertikal + 3x horizontal für lückenloses Kacheln
    for(let ty=-1;ty<=1;ty++){
      for(let tx=-1;tx<=1;tx++){
        ctx.drawImage(bgImg, tx*tileW - px, ty*tileH + py - tileH, tileW, tileH);
      }
    }
  }
  ctx.fillStyle="rgba(255,255,255,0.1)";ctx.fillRect(0,0,W,H);
  CLOUDS.forEach(c=>{const spd=[0.05,0.12][c.l];const dy=(c.y+cameraY*0.06*(c.l+1))%H;const driftX=(c.x-cameraX*(0.06+c.l*0.04)%W+W*10)%W;drawCloud(ctx,driftX,dy,c.s);});
  UFOS.forEach((u,i)=>{const py=u.y-cameraY*(0.10+i*0.04)*0.5;const wx=(u.x-cameraX*(0.08+i*0.03)+Math.sin(frame*0.012+i*2.1)*18+W*10)%W;if(py>-60&&py<H+60)drawUFO(ctx,wx,py,u.sc,frame+i*30,u.hue);});
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.82);vig.addColorStop(0,"rgba(0,0,0,0)");vig.addColorStop(1,"rgba(0,0,40,0.15)");ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
}

// ── Hauptkomponente ─────────────────────────────────────────────────────────
function AstroHopper(){
  const canvasRef=useRef(null);
  const stateRef=useRef(null);
  const animRef=useRef(null);
  const audioRef=useRef(null);
  const bgImgRef=useRef(null);
  const platImgRef=useRef(null);
  const movPlatImgRef=useRef(null);
  const gyroActiveRef=useRef(false);
  const touchRef=useRef({left:false,right:false});

  const [screen,setScreen]=useState("start");
  const [best,setBest]=useState(0);
  const [finalScore,setFinalScore]=useState(0);
  const [finalLevel,setFinalLevel]=useState(1);
  const [bgLoaded,setBgLoaded]=useState(false);
  const [gyroStatus,setGyroStatus]=useState("unbekannt"); // debug
  const [tiltDisplay,setTiltDisplay]=useState(0);

  // Bilder laden
  useEffect(()=>{
    const bg=new Image(); bg.onload=()=>{bgImgRef.current=bg;setBgLoaded(true);}; bg.src=BG_IMG_SRC;
    const pl=new Image(); pl.onload=()=>{platImgRef.current=pl;}; pl.src=PLAT_IMG_SRC;
    const mp=new Image(); mp.onload=()=>{movPlatImgRef.current=mp;}; mp.src=MOV_PLAT_IMG_SRC;
  },[]);
  useEffect(()=>{audioRef.current=createAudio();return()=>audioRef.current?.stopMusic();},[]);

  // ── GYRO: einmal global registrieren ──────────────────────────────────────
  useEffect(()=>{
    function onOrientation(e){
      // gamma: -90=links, 0=gerade, +90=rechts
      const g = e.gamma;
      if(g===null||g===undefined) return;
      g_gamma = g;
      setTiltDisplay(Math.round(g));
    }

    if(typeof DeviceOrientationEvent==="undefined"){
      setGyroStatus("kein Sensor");
      return;
    }

    // Android / non-iOS: direkt lauschen
    if(typeof DeviceOrientationEvent.requestPermission !== "function"){
      window.addEventListener("deviceorientation", onOrientation, true);
      setGyroStatus("aktiv");
      gyroActiveRef.current = true;
      return ()=>window.removeEventListener("deviceorientation",onOrientation,true);
    }

    // iOS 13+: noch keine Erlaubnis – warten auf requestGyro()
    setGyroStatus("ios-warten");
    // Listener wird später in requestGyro hinzugefügt
    window._gyroHandler = onOrientation; // merken für später
    return ()=>{if(window._gyroHandler)window.removeEventListener("deviceorientation",window._gyroHandler,true);};
  },[]);

  // requestGyro ist jetzt inline in startGame

  const sfx=useCallback(n=>{try{audioRef.current?.sfx[n]?.();}catch(e){}},[]);

  const initState=useCallback(()=>{
    const plats=genPlatforms(PLATFORM_COUNT,1);
    stateRef.current={
      player:{x:0,y:H-130,vx:0,vy:-7.5,facing:1,dead:false,deathTimer:0},
      platforms:plats,enemies:[],powerups:[],particles:[],messages:[],
      score:0,cameraY:0,cameraX:0,nextY:plats.reduce((m,p)=>Math.min(m,p.y), H),
      frame:0,shield:0,rocket:0,level:1,levelUpTimer:0,
      enemyCooldown:300,powerupCooldown:350,
    };
  },[]);

  const startGame=useCallback(()=>{
    // Gyro-Erlaubnis versuchen - NIEMALS das Spiel blockieren
    if(typeof DeviceOrientationEvent!=="undefined" &&
       typeof DeviceOrientationEvent.requestPermission==="function"){
      DeviceOrientationEvent.requestPermission()
        .then(res=>{ if(res==="granted") setGyroStatus("aktiv"); })
        .catch(()=>{}); // Fehler ignorieren
    }
    // Spiel sofort starten - unabhängig vom Gyro
    try{ audioRef.current?.resume(); }catch(e){}
    initState();
    setScreen("play");
    setTimeout(()=>{ try{ audioRef.current?.startMusic(); }catch(e){} },50);
  },[initState]);

  // ── Game Loop ─────────────────────────────────────────────────────────────
  useEffect(()=>{
    if(screen!=="play") return;
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext("2d");

    function spawnParts(s,x,y,color,n=8){for(let i=0;i<n;i++)s.particles.push({x,y,vx:rnd(-3,3),vy:rnd(-4.5,0.5),life:rnd(20,42),maxLife:42,r:rnd(3,6),color});}
    function addMsg(s,text,x,y,color="#1b5e20"){s.messages.push({text,x:Math.min(x,W-185),y,life:80,maxLife:80,color});}

    function loop(){
      const s=stateRef.current; if(!s) return;
      s.frame++;
      const p=s.player;
      const stats=getLevelStats(s.level);

      // ── Steuerung: Gyro + Touch-Buttons kombiniert ──
      const DEAD=6, MAX=40;
      const gam=g_gamma;
      const tiltFactor=Math.min(1,Math.max(0,(Math.abs(gam)-DEAD)/(MAX-DEAD)));
      const tiltSpeed=stats.moveSpeed*Math.max(0.25,tiltFactor);
      const goLeft  = touchRef.current.left  || gam < -DEAD;
      const goRight = touchRef.current.right || gam >  DEAD;
      const btnSpeed = stats.moveSpeed; // volle Speed bei Buttons
      if(!p.dead){
        if(goLeft)       {p.vx = touchRef.current.left ? -btnSpeed : -tiltSpeed; p.facing=-1;}
        else if(goRight) {p.vx = touchRef.current.right ?  btnSpeed :  tiltSpeed; p.facing= 1;}
        else p.vx*=0.78;
      }

      // Level Up
      const nextLvlScore=getLevelStats(s.level).nextLevel;
      if(s.score>=nextLvlScore&&s.level<20){
        s.level++;if(s.level===4&&typeof window.ReactNativeWebView!=='undefined'){window.ReactNativeWebView.postMessage('showAd');}s.levelUpTimer=120;sfx("levelUp");
        const prevPlatCount=getLevelStats(s.level-1).platCount;
        const curPlatCount=getLevelStats(s.level).platCount;
        const lvlMsg=curPlatCount<prevPlatCount?"🌟 Level "+s.level+"! Weniger Böden!":"🌟 Level "+s.level+"!";
        addMsg(s,lvlMsg,30,H/2-60,"#f57f17");
        spawnParts(s,W/2,H/2,"#ffd700",20);spawnParts(s,W/2,H/2,"#ff8a65",12);
      }
      if(s.levelUpTimer>0)s.levelUpTimer--;

      // Physik
      if(s.rocket>0){s.rocket--;p.vy=-14;if(s.rocket%3===0)spawnParts(s,p.x+PLAYER_W/2,p.y+PLAYER_H,"#ff9800",3);}
      else p.vy+=stats.gravity;
      p.x+=p.vx;p.y+=p.vy;
      // Kamera zentriert sofort auf Spieler
      s.cameraX = p.x - W/2 + PLAYER_W/2;

      // Plattformen
      if(p.vy>0&&!p.dead&&s.rocket===0){
        for(const pl of s.platforms){
          const py=pl.y-s.cameraY;
          if(p.x+PLAYER_W>pl.x+6&&p.x<pl.x+PLATFORM_W-6&&p.y+PLAYER_H>py&&p.y+PLAYER_H<py+PLATFORM_H+16&&(pl.alpha??1)>0.15){
            p.vy=stats.jumpForce;sfx("jump");
            if(pl.type==="crumble"&&!pl.crumbling){pl.crumbling=true;sfx("crumble");}
          }
        }
      }
      for(const pl of s.platforms){
        if(pl.crumbling){pl.crumbleTimer++;pl.alpha=Math.max(0,1-pl.crumbleTimer/60);}
        if(pl.type==="moving"){pl.x+=pl.driftSpeed*(1+(s.level-1)*0.05);} // langsam in eine Richtung driften
      }
      s.platforms=s.platforms.filter(pl=>!(pl.type==="crumble"&&pl.alpha<=0.05));

      // Kamera
      if(p.y<H*0.42){const d=H*0.42-p.y;s.cameraY-=d;p.y+=d;s.score+=Math.floor(d*0.12);}
      // ── Plattform-Welt pflegen ──
      const pst = getLevelStats(s.level);
      const CW  = PLAT_CELL_W;                          // 128px Zellenbreite
      const CH  = Math.round(pst.platGapMin * 3.2);     // Zellenhöhe

      // Sichtfenster + Vorschau nach oben
      const VL = s.cameraX - W * 1.2;
      const VR = s.cameraX + W * 2.2;
      const VT = s.cameraY - H * 7;
      const VB = s.cameraY + H * 0.8;

      // Alte Plattformen weit außerhalb entfernen
      s.platforms = s.platforms.filter(pl =>
        pl.y > VT - H * 3 &&
        pl.y < VB + H &&
        pl.x > VL - W * 3 &&
        pl.x < VR + W * 3
      );

      // Grid-Zellen im Sichtbereich berechnen
      const colS = Math.floor(VL / CW) - 1;
      const colE = Math.ceil(VR  / CW) + 1;
      const rowS = Math.floor(VT / CH) - 1;
      const rowE = Math.ceil(VB  / CH) + 1;

      // Bestehende Zellen-Keys merken (Zelle = col,row)
      const filled = new Set(s.platforms.map(p =>
        Math.round(p.x / CW) + "," + Math.round(p.y / CH)
      ));

      // Jede leere Zelle im Sichtbereich füllen (mit Skip-Chance)
      const skip = Math.min(0.80, 0.55 + (s.level - 1) * 0.014);
      const maxJ = Math.floor((CW - PLATFORM_W) / 2) - 2; // max Jitter

      for(let r = rowS; r <= rowE; r++){
        for(let c = colS; c <= colE; c++){
          const key = c + "," + r;
          if(filled.has(key)) continue;
          filled.add(key); // auch leere Zellen markieren
          if(Math.random() < skip) continue; // diese Zelle bleibt leer
          // Plattform in Zellmitte ± kleiner Jitter
          const px = c * CW + Math.round(rnd(-maxJ, maxJ));
          const py = r * CH + Math.round(rnd(-CH * 0.08, CH * 0.08));
          s.platforms.push(makePlatform(px, py, null, s.level));
        }
      }

      // Gegner
      const ecb=Math.max(90,280-s.level*12);
      if(--s.enemyCooldown<=0&&s.score>40){const ne=makeEnemy(s.cameraY,s.level);ne.x=s.cameraX+rnd(20,W-60);s.enemies.push(ne);s.enemyCooldown=rndInt(ecb,ecb+120);}
      if(--s.powerupCooldown<=0){const pu=makePU(s.cameraY);pu.x=s.cameraX+rnd(20,W-60);s.powerups.push(pu);s.powerupCooldown=rndInt(200,360);}
      for(const e of s.enemies){e.x+=e.vx;if(e.x<=0||e.x+44>=W)e.vx*=-1;e.y+=e.vy;}

      // Powerups
      if(!p.dead){s.powerups=s.powerups.filter(pu=>{const puy=pu.y-s.cameraY;pu.bob+=0.08;const by=puy+Math.sin(pu.bob)*5;const hit=p.x+PLAYER_W>pu.x&&p.x<pu.x+38&&p.y+PLAYER_H>by&&p.y<by+38;if(hit){if(pu.type==="shield"){s.shield=300;addMsg(s,"🛡️ Schild!",W/2-40,p.y-25,"#1565c0");spawnParts(s,p.x+PLAYER_W/2,p.y,"#29b6f6",14);sfx("shield");}else{s.rocket=180;addMsg(s,"🚀 Boost!",W/2-30,p.y-25,"#e65100");spawnParts(s,p.x+PLAYER_W/2,p.y,"#ff9800",14);sfx("rocket");}return false;}return puy<H+40;});}

      // Feinde
      if(!p.dead){for(let i=s.enemies.length-1;i>=0;i--){const e=s.enemies[i],ey=e.y-s.cameraY;const ex=e.x;if(p.x+PLAYER_W-10>ex&&p.x+10<ex+44&&p.y+PLAYER_H-10>ey&&p.y+10<ey+44){if(s.shield>0){
              // Schild schützt
              s.shield=0;s.enemies.splice(i,1);
              addMsg(s,"🛡️ Schild weg!",W/2-55,p.y-25,"#1565c0");
              spawnParts(s,e.x+22,ey+22,"#29b6f6",16);sfx("shieldBreak");
            }else if(s.rocket>0){
              // Raketenbooster schützt ebenfalls – Feind wird weggeblasen
              s.enemies.splice(i,1);
              addMsg(s,"🚀 Feind weggefegt!",W/2-65,p.y-25,"#e65100");
              spawnParts(s,e.x+22,ey+22,"#ff9800",18);
              spawnParts(s,e.x+22,ey+22,"#ffd600",10);
              sfx("rocket");
            }else{
              p.dead=true;spawnParts(s,p.x+PLAYER_W/2,p.y+PLAYER_H/2,"#ff5252",24);sfx("die");audioRef.current?.stopMusic();
            }break;}}}
      if(s.shield>0)s.shield--;

      if(p.dead){p.deathTimer++;p.vy+=0.5;p.y+=p.vy;if(p.deathTimer>90){setFinalScore(s.score);setFinalLevel(s.level);setBest(prev=>Math.max(prev,s.score));if(typeof window.ReactNativeWebView!=='undefined'){window.ReactNativeWebView.postMessage('showAd');}setScreen("over");return;}}
      if(p.y>H+80&&!p.dead){sfx("die");audioRef.current?.stopMusic();setFinalScore(s.score);setFinalLevel(s.level);setBest(prev=>Math.max(prev,s.score));if(typeof window.ReactNativeWebView!=='undefined'){window.ReactNativeWebView.postMessage('showAd');}setScreen("over");return;}

      s.enemies=s.enemies.filter(e=>e.y-s.cameraY<H+80&&e.y-s.cameraY>-220);
      s.powerups=s.powerups.filter(pu=>pu.y-s.cameraY<H+60);
      s.particles=s.particles.filter(pt=>pt.life>0);
      for(const pt of s.particles){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.18;pt.life--;}
      s.messages=s.messages.filter(m=>m.life>0);
      for(const m of s.messages){m.y-=0.65;m.life--;}

      // ═══ DRAW ═══
      drawBG(ctx,bgImgRef.current,s.cameraY,s.cameraX,s.frame);

      // Welt horizontal verschieben
      ctx.save();
      ctx.translate(-s.cameraX, 0);

      for(const pt of s.particles){ctx.globalAlpha=pt.life/pt.maxLife;ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fill();}
      ctx.globalAlpha=1;

      // Plattformen
      for(const pl of s.platforms){
        const px=pl.x, py=pl.y-s.cameraY; // world coords, canvas already translated
        if(py<-20||py>H+20)continue;
        const da=pl.type==="crumble"?Math.max(0.35,pl.alpha??1):1;ctx.globalAlpha=da;
        ctx.fillStyle="rgba(0,0,0,0.15)";ctx.beginPath();ctx.ellipse(px+PLATFORM_W/2,py+PLATFORM_H+5,PLATFORM_W/2-2,5,0,0,Math.PI*2);ctx.fill();
        // Bewegende Plattformen nutzen ihr eigenes Bild
        const platImg = pl.type==="moving" ? movPlatImgRef.current : platImgRef.current;
        const IW = PLATFORM_W + 20;
        const IH = Math.round(IW * 0.52);
        const IX = px - 10;
        const IY = py - IH + PLATFORM_H + 4;

        if(platImg){
          ctx.save();
          // Farbton nur noch für crumble
          if(pl.type==="moving"){
          } else if(pl.type==="crumble"){
            ctx.filter = pl.crumbling
              ? "sepia(1) saturate(3) hue-rotate(-10deg) brightness(0.85)"
              : "sepia(0.4) saturate(1.8) hue-rotate(20deg)";
          }
          // Beim Zerbrechen wackeln
          if(pl.crumbling){
            const shake = Math.sin(pl.crumbleTimer*0.8)*2*(1-pl.alpha);
            ctx.translate(px + PLATFORM_W/2 + shake, py);
            ctx.translate(-(px + PLATFORM_W/2), -py);
          }
          ctx.drawImage(platImg, IX, IY, IW, IH);
          ctx.filter="none";
          ctx.restore();
        } else {
          // Fallback falls Bild noch nicht geladen
          const pg=ctx.createLinearGradient(px,py,px,py+PLATFORM_H);
          if(pl.type==="crumble"){pg.addColorStop(0,"#ffe082");pg.addColorStop(1,"#f57c00");}
          else if(pl.type==="moving"){pg.addColorStop(0,"#ce93d8");pg.addColorStop(1,"#8e24aa");}
          else{pg.addColorStop(0,"#a5d6a7");pg.addColorStop(1,"#388e3c");}
          ctx.fillStyle=pg;ctx.beginPath();ctx.roundRect(px,py,PLATFORM_W,PLATFORM_H,8);ctx.fill();
        }
        ctx.globalAlpha=1;
        // Label
        if(pl.type==="crumble"&&!pl.crumbling){
          ctx.font="bold 8px sans-serif";ctx.fillStyle="#7f3000";
          ctx.textAlign="center";ctx.textBaseline="middle";
          ctx.fillText("BRÜCHIG",px+PLATFORM_W/2,py+8);
        }
        if(pl.type==="moving"){
          ctx.font="10px serif";ctx.textAlign="center";ctx.textBaseline="middle";
          ctx.fillText("↔",px+PLATFORM_W/2,py+8);
        }
      }

      // Powerups
      for(const pu of s.powerups){const puy=pu.y-s.cameraY+Math.sin(pu.bob)*5;if(puy<-50||puy>H+50)continue;ctx.save();ctx.globalAlpha=1;ctx.shadowColor=pu.type==="shield"?"#29b6f6":"#ff9800";ctx.shadowBlur=22;ctx.fillStyle=pu.type==="shield"?"rgba(41,182,246,0.2)":"rgba(255,152,0,0.2)";ctx.beginPath();ctx.arc(pu.x+18,puy+18,22,0,Math.PI*2);ctx.fill();ctx.font="28px serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(pu.type==="shield"?"🛡️":"🚀",pu.x+18,puy+18);ctx.shadowBlur=0;ctx.restore();}

      // Gegner
      for(const e of s.enemies){const ey=e.y-s.cameraY;if(ey<-70||ey>H+50)continue;ctx.save();ctx.globalAlpha=1;ctx.fillStyle="rgba(255,255,255,0.92)";ctx.beginPath();ctx.arc(e.x+22,ey+22,22,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#e53935";ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(e.x+22,ey+22,22,0,Math.PI*2);ctx.stroke();ctx.font=`${e.size}px serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(e.emoji,e.x+22,ey+22);ctx.restore();}

      // Spieler
      if(!p.dead||p.deathTimer%6<4){ctx.save();ctx.globalAlpha=1;drawMonster(ctx,p.x+PLAYER_W/2,p.y+PLAYER_H-4,p.facing,s.rocket>0?1.2:(p.vy>0?1:Math.max(0.85,1+p.vy*0.006)));ctx.restore();}
      if(s.shield>0){const pulse=0.8+0.2*Math.sin(s.frame*0.14);ctx.save();ctx.globalAlpha=pulse;ctx.strokeStyle="#29b6f6";ctx.lineWidth=4;ctx.shadowColor="#29b6f6";ctx.shadowBlur=16;ctx.beginPath();ctx.arc(p.x+PLAYER_W/2,p.y+PLAYER_H/2-8,PLAYER_W*0.9,0,Math.PI*2);ctx.stroke();ctx.restore();}
      if(s.rocket>0){ctx.save();for(let i=0;i<4;i++){ctx.globalAlpha=0.9-i*0.18;ctx.font=`${20-i*3}px serif`;ctx.textAlign="center";ctx.fillText("🔥",p.x+PLAYER_W/2+rnd(-6,6),p.y+PLAYER_H+6+i*11);}ctx.restore();}

      ctx.restore(); // Ende Welt-Translation

      // Level-Up Flash
      if(s.levelUpTimer>60){ctx.save();ctx.globalAlpha=(s.levelUpTimer-60)/60*0.28;ctx.fillStyle="#fff9c4";ctx.fillRect(0,0,W,H);ctx.restore();}

      // Nachrichten
      for(const m of s.messages){ctx.save();ctx.globalAlpha=Math.min(1,m.life/m.maxLife*2);ctx.font="bold 15px sans-serif";ctx.fillStyle=m.color||"#1b5e20";ctx.shadowColor="rgba(255,255,255,0.9)";ctx.shadowBlur=5;ctx.textAlign="left";ctx.textBaseline="top";ctx.fillText(m.text,m.x,m.y);ctx.restore();}

      // HUD Score
      ctx.fillStyle="rgba(255,255,255,0.88)";ctx.beginPath();ctx.roundRect(10,10,132,36,12);ctx.fill();
      ctx.strokeStyle="#66bb6a";ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(10,10,132,36,12);ctx.stroke();
      ctx.fillStyle="#1b5e20";ctx.font="bold 14px \'Courier New\'";ctx.textAlign="left";ctx.textBaseline="middle";ctx.fillText(`⭐ ${s.score}`,20,28);

      // Level
      ctx.fillStyle=s.levelUpTimer>0?"#ffd600":"rgba(255,255,255,0.88)";ctx.beginPath();ctx.roundRect(10,52,132,28,10);ctx.fill();
      ctx.strokeStyle="#ffd600";ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(10,52,132,28,10);ctx.stroke();
      ctx.fillStyle="#e65100";ctx.font="bold 13px \'Courier New\'";ctx.textAlign="left";ctx.textBaseline="middle";ctx.fillText(`🌟 Level ${s.level}`,20,66);

      const thisLvl=getLevelStats(s.level-1).nextLevel;
      const prog=Math.min(1,(s.score-thisLvl)/Math.max(1,nextLvlScore-thisLvl));
      ctx.fillStyle="rgba(0,0,0,0.1)";ctx.beginPath();ctx.roundRect(10,84,132,8,4);ctx.fill();
      ctx.fillStyle="#ffd600";ctx.beginPath();ctx.roundRect(10,84,132*prog,8,4);ctx.fill();

      // Shield/Rocket bars
      if(s.shield>0){ctx.fillStyle="rgba(255,255,255,0.88)";ctx.beginPath();ctx.roundRect(W-122,10,112,34,10);ctx.fill();ctx.fillStyle="#0288d1";ctx.fillRect(W-112,20,92*(s.shield/300),12);ctx.fillStyle="#1b5e20";ctx.font="10px sans-serif";ctx.textAlign="right";ctx.textBaseline="middle";ctx.fillText("🛡️ Schild",W-16,18);}
      if(s.rocket>0){const ry=s.shield>0?50:10;ctx.fillStyle="rgba(255,255,255,0.88)";ctx.beginPath();ctx.roundRect(W-122,ry,112,34,10);ctx.fill();ctx.fillStyle="#ef6c00";ctx.fillRect(W-112,ry+12,92*(s.rocket/180),10);ctx.fillStyle="#1b5e20";ctx.font="10px sans-serif";ctx.textAlign="right";ctx.textBaseline="middle";ctx.fillText("🚀 Boost",W-16,ry+8);}

      // Tilt-Anzeige entfernt – Buttons ausreichend
      animRef.current=requestAnimationFrame(loop);
    }
    animRef.current=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(animRef.current);
  },[screen,sfx,bgLoaded]);

  const overlaySt={position:"absolute",inset:0,backgroundImage:`url(${BG_IMG_SRC})`,backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"};
  const mainBtn=(bg,sh)=>({marginTop:8,padding:"16px 48px",borderRadius:50,border:"none",background:bg,color:"#fff",fontSize:18,fontWeight:"bold",cursor:"pointer",letterSpacing:1,boxShadow:`0 4px 20px ${sh}`});

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#0a0418",fontFamily:"'Courier New',monospace",padding:0,margin:0}}>
      <div style={{position:"relative",width:W,height:H,borderRadius:24,overflow:"hidden",boxShadow:"0 8px 40px rgba(0,0,0,0.25)"}}>
        <canvas ref={canvasRef} width={W} height={H} style={{display:screen==="play"?"block":"none"}}/>

        {/* START */}
        {screen==="start"&&(
          <div style={overlaySt}>
            <div style={{position:"absolute",inset:0,background:"rgba(200,235,255,0.72)",pointerEvents:"none"}}/>
            <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
              <canvas width={110} height={120} ref={el=>{if(el){const c=el.getContext("2d");c.clearRect(0,0,110,120);drawMonster(c,55,100,1,1);}}} style={{background:"transparent"}}/>
              <div style={{color:"#1565c0",fontSize:30,fontWeight:"bold",letterSpacing:3,textShadow:"2px 2px 0 rgba(255,255,255,0.8)"}}>ASTRO HOPPER</div>

              {/* Gyro-Status Anzeige */}
              <div style={{background:"rgba(255,255,255,0.85)",borderRadius:16,padding:"10px 20px",
                color:"#4e342e",fontSize:12,textAlign:"center",lineHeight:1.9,border:"2px solid #a5d6a7",maxWidth:280}}>
                🟢 Normal &nbsp;🟣 Bewegt &nbsp;🟡 Brüchig<br/>
                🛡️ Schild &nbsp;🚀 Raketenbooster<br/>
                <div style={{marginTop:6,padding:"6px 10px",borderRadius:8,background:"rgba(21,101,192,0.1)",border:"1px solid rgba(21,101,192,0.3)"}}>
                  📱 <b>Handy kippen</b> = Steuerung<br/>
                  <span style={{fontSize:10,color:"#666"}}>
                    {gyroStatus==="aktiv" ? "✅ Sensor aktiv" :
                     gyroStatus==="ios-warten" ? "⚠️ iOS: Erlaubnis wird beim Start angefragt" :
                     gyroStatus==="verweigert" ? "❌ Sensor verweigert – bitte in Einstellungen erlauben" :
                     gyroStatus==="kein Sensor" ? "ℹ️ Kein Sensor – Tastatur ← → verwenden" :
                     "⏳ Sensor wird geprüft..."}
                  </span>
                </div>
              </div>

              {/* Live-Neigungstest auf Startscreen */}
              {gyroStatus==="aktiv"&&(
                <div style={{background:"rgba(255,255,255,0.8)",borderRadius:10,padding:"6px 16px",fontSize:11,textAlign:"center"}}>
                  Test-Neigung: <b style={{color:tiltDisplay<-6?"#29b6f6":tiltDisplay>6?"#ff9800":"#388e3c"}}>{tiltDisplay}°</b>
                  {" "}{tiltDisplay<-6?"◀ links":tiltDisplay>6?"rechts ▶":"• gerade"}
                </div>
              )}

              {best>0&&<div style={{color:"#f57f17",fontSize:14,fontWeight:"bold"}}>🏆 Bestes: {best}</div>}
              <button onClick={startGame} style={mainBtn("linear-gradient(135deg,#29b6f6,#1565c0)","rgba(21,101,192,0.4)")}>
                {gyroStatus==="ios-warten"?"🎮 START + SENSOR ERLAUBEN":"SPIELEN ▶"}
              </button>
              <div style={{color:"rgba(0,0,0,0.35)",fontSize:10,textAlign:"center"}}>
                🔊 Ton aktiviert beim Start
              </div>
            </div>
          </div>
        )}

        {/* Touch-Buttons im Spiel */}
        {screen==="play"&&<>
          <div
            onPointerDown={()=>touchRef.current.left=true}
            onPointerUp={()=>touchRef.current.left=false}
            onPointerLeave={()=>touchRef.current.left=false}
            style={{position:"absolute",bottom:50,left:14,width:84,height:64,
              borderRadius:20,background:"rgba(255,255,255,0.22)",
              border:"3px solid rgba(255,255,255,0.5)",display:"flex",
              alignItems:"center",justifyContent:"center",
              fontSize:30,color:"#fff",cursor:"pointer",userSelect:"none",
              backdropFilter:"blur(4px)",touchAction:"none",WebkitUserSelect:"none",
              fontWeight:"bold",boxShadow:"0 4px 14px rgba(0,0,0,0.2)"}}>◀</div>
          <div
            onPointerDown={()=>touchRef.current.right=true}
            onPointerUp={()=>touchRef.current.right=false}
            onPointerLeave={()=>touchRef.current.right=false}
            style={{position:"absolute",bottom:50,right:14,width:84,height:64,
              borderRadius:20,background:"rgba(255,255,255,0.22)",
              border:"3px solid rgba(255,255,255,0.5)",display:"flex",
              alignItems:"center",justifyContent:"center",
              fontSize:30,color:"#fff",cursor:"pointer",userSelect:"none",
              backdropFilter:"blur(4px)",touchAction:"none",WebkitUserSelect:"none",
              fontWeight:"bold",boxShadow:"0 4px 14px rgba(0,0,0,0.2)"}}>▶</div>
        </>}

        {/* GAME OVER */}
        {screen==="over"&&(
          <div style={overlaySt}>
            <div style={{position:"absolute",inset:0,background:"rgba(200,235,255,0.78)",pointerEvents:"none"}}/>
            <div style={{position:"relative",zIndex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
              <div style={{fontSize:62}}>😵</div>
              <div style={{color:"#c62828",fontSize:28,fontWeight:"bold",letterSpacing:2}}>GAME OVER</div>
              <div style={{background:"rgba(255,255,255,0.88)",borderRadius:16,padding:"14px 28px",textAlign:"center",border:"2px solid #ef9a9a"}}>
                <div style={{color:"#1b5e20",fontSize:22,fontWeight:"bold"}}>⭐ {finalScore}</div>
                <div style={{color:"#e65100",fontSize:15}}>🌟 Level {finalLevel} erreicht</div>
                {finalScore>=best&&finalScore>0?<div style={{color:"#f57f17",fontSize:14,marginTop:4}}>🏆 Neuer Rekord!</div>:<div style={{color:"rgba(0,0,0,0.4)",fontSize:13,marginTop:4}}>Bestes: {best}</div>}
              </div>
              <button onClick={startGame} style={mainBtn("linear-gradient(135deg,#ef5350,#b71c1c)","rgba(183,28,28,0.4)")}>NOCHMAL ▶</button>
            </div>
          </div>
        )}
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AstroHopper));
  </script>
</body>
</html>
